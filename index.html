<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Mini App</title>
    <!-- Подключаем скрипт Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color); /* Используем цвета темы Telegram */
            color: var(--tg-theme-text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        button {
            padding: 10px 20px;
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Привет, <span id="username">Пользователь</span>!</h1>
    <p>Это твое первое Mini App.</p>
    <button id="main-btn">Отправить данные боту</button>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширить на весь экран

        // Выводим имя пользователя
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('username').innerText = user.first_name;
        }

        // Обработка нажатия кнопки
        document.getElementById('main-btn').addEventListener('click', () => {
            const data = {
                message: "Привет из Mini App!",
                time: new Date().toLocaleTimeString()
            };
            tg.sendData(JSON.stringify(data)); // Отправляем данные боту и закрываем приложение
        });
    </script>
</body>
</html>
