<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-page Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #999999);
            --btn: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
        }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page { display: none; width: 100%; text-align: center; }
        .active { display: block; }

        .card {
            background: rgba(0,0,0,0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        button {
            background-color: var(--btn);
            color: var(--btn-text);
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            margin-top: 10px;
        }

        .hint { color: var(--hint); font-size: 0.8em; }
    </style>
</head>
<body>

    <!-- Главная страница -->
    <div id="page-home" class="page active">
        <h1>Панель управления</h1>
        <div class="card">
            <p>Добро пожаловать в CRM!</p>
            <p class="hint">Выберите раздел для работы</p>
        </div>
        <button onclick="navigateTo('page-monitors')">🖥 Мониторы</button>
        <button onclick="navigateTo('page-settings')">⚙️ Настройки</button>
    </div>

    <!-- Страница Мониторов -->
    <div id="page-monitors" class="page">
        <h1>Мониторы</h1>
        <div class="card">🖥 Монитор #1: <span style="color: green;">Online</span></div>
        <div class="card">🖥 Монитор #2: <span style="color: red;">Offline</span></div>
        <button onclick="navigateTo('page-home')">⬅ Назад</button>
    </div>

    <!-- Страница Настроек -->
    <div id="page-settings" class="page">
        <h1>Настройки</h1>
        <div class="card">
            <label>Уведомления: </label>
            <input type="checkbox" checked>
        </div>
        <button onclick="sendDataToBot()">Сохранить настройки</button>
        <button onclick="navigateTo('page-home')">⬅ Назад</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Функция навигации
        function navigateTo(pageId) {
            // Скрываем все страницы
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            // Показываем нужную
            document.getElementById(pageId).classList.add('active');

            // Управляем кнопкой "Назад" в самом Telegram
            if (pageId === 'page-home') {
                tg.BackButton.hide();
            } else {
                tg.BackButton.show();
            }
        }

        // Слушатель нажатия системной кнопки "Назад" (вверху слева в TG)
        tg.onEvent('backButtonClicked', () => {
            navigateTo('page-home');
        });

        // Отправка данных боту
        function sendDataToBot() {
            const data = { action: 'save_settings', status: 'success' };
            tg.sendData(JSON.stringify(data));
        }

        // Автоматически настраиваем цвета основного интерфейса Telegram
        tg.ready();
    </script>
</body>
</html>
